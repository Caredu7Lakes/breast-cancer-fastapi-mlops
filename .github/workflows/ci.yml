name: FastAPI ML API CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: breast_cancer_api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate FastAPI app import
        working-directory: breast_cancer_api
        run: |
          python -c "from app import app; print('FastAPI app imported successfully')"

      - name: Check model file exists
        working-directory: breast_cancer_api
        run: |
          python -c "import os; assert os.path.exists('modelo_cancer.pkl'), 'modelo_cancer.pkl not found'; print('Model file found')"